name: ShiftLeft Forge Security Pipeline
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
permissions:
  contents: read
  security-events: write   # lets scan results appear in GitHub Security tab
  id-token: write          # required for OIDC (Cosign signing, no static keys)

jobs:
  secret-scan:
    name: "Stage 1: Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full git history, not just latest commit
 
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

sast-scan:
    name: "Stage 2: SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
 
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/python

dependency-scan:
    name: "Stage 3: Dependency Scan (SCA)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install pip-audit
        run: pip install pip-audit
 
      - name: Run pip-audit
        run: pip-audit -r app/requirements.txt -f json -o pip-audit-results.json || true
 
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

iac-scan:
    name: "Stage 4: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
 
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
 
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif



build-scan-push:
    name: "Stage 5-8: Build, Scan, Push, Sign"
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-scan, iac-scan]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
 
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::204146947248:role/github-actions-shiftleft-forge
          aws-region: us-east-1
 
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build Docker image
        run: |
          docker build -t shiftleft-forge-demo:${{ github.sha }} ./app
 
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shiftleft-forge-demo:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
 
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
 
      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag shiftleft-forge-demo:${{ github.sha }} \
            $ECR_REGISTRY/shiftleft-forge-demo:${{ github.sha }}
          docker push $ECR_REGISTRY/shiftleft-forge-demo:${{ github.sha }}
 
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
 
      - name: Sign image (keyless via OIDC)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            $ECR_REGISTRY/shiftleft-forge-demo:${{ github.sha }}
